services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      # api/config.py reads GHOSTWATCH_-prefixed vars
      - GHOSTWATCH_CORS_ORIGINS=http://localhost:3000
      - GHOSTWATCH_DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      # static export served by nginx on 80 inside the container
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
